<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark: #1a1a1a;
            --bg-sidebar: #f0c4c4;
            --bg-sidebar-hover: #e8b0b0;
            --bg-sidebar-active: #2a2a2a;
            --bg-right: #f5dede;
            --pink: #f2b8c6;
            --pink-light: #fce4ec;
            --pink-accent: #e8909c;
            --pink-dark: #d4707e;
            --text-dark: #1a1a1a;
            --text-light: #ffffff;
            --text-muted: #888888;
            --border: #333333;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #2a2a2a;
            color: var(--text-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .player-window {
            width: 1340px;
            height: 740px;
            background: var(--bg-dark);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* Header */
        .title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .title-bar h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text-light);
        }

        .window-controls {
            display: flex;
            gap: 10px;
        }

        .win-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--pink);
            color: var(--text-dark);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 16px;
        }

        .win-btn:hover { background: var(--pink-accent); }
        .win-btn.close { background: #e57373; color: white; }

        /* Main Layout */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left Sidebar */
        .sidebar-left {
            width: 220px;
            background: var(--bg-sidebar);
            padding: 20px 0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-section {
            margin-bottom: 8px;
        }

        .sidebar-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dark);
            padding: 8px 20px;
            opacity: 0.6;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .sidebar-item:hover {
            background: var(--bg-sidebar-hover);
        }

        .sidebar-item.active {
            background: var(--bg-sidebar-active);
            color: var(--text-light);
            border-radius: 8px;
            margin: 0 10px;
            padding: 11px 14px;
        }

        .sidebar-item svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Center Content */
        .content-center {
            flex: 1;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: 20px 28px 12px;
        }

        .content-header h2 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-light);
        }

        /* Songs Table */
        .songs-table {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 12px;
        }

        .songs-table::-webkit-scrollbar {
            width: 6px;
        }

        .songs-table::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        .table-header {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 1fr 80px 50px;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        .track-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 1fr 80px 50px;
            padding: 10px 16px;
            align-items: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 14px;
        }

        .track-row:hover {
            background: rgba(242, 184, 198, 0.08);
        }

        .track-row.playing {
            background: var(--pink-light);
            color: var(--text-dark);
        }

        .track-row .num {
            font-weight: 600;
            color: var(--text-muted);
        }

        .track-row.playing .num {
            color: var(--pink-dark);
        }

        .track-row .title-cell {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .track-row .title-cell .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--pink-accent);
            display: none;
        }

        .track-row.playing .title-cell .dot {
            display: block;
        }

        .track-row .artist-cell,
        .track-row .album-cell {
            color: var(--text-muted);
        }

        .track-row.playing .artist-cell,
        .track-row.playing .album-cell {
            color: #666;
        }

        .track-row .duration-cell {
            color: var(--text-muted);
            font-size: 13px;
        }

        .track-row .love-cell {
            text-align: center;
        }

        .love-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            padding: 4px;
        }

        .love-btn:hover { color: var(--pink-accent); }
        .love-btn.liked { color: var(--pink-dark); }
        .track-row.playing .love-btn { color: var(--pink-dark); }

        /* Right Sidebar */
        .sidebar-right {
            width: 240px;
            background: var(--bg-right);
            padding: 20px 16px;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .sidebar-right::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-right::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 2px;
        }

        .up-next-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .up-next-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .up-next-item:hover {
            background: rgba(0,0,0,0.06);
        }

        .up-next-thumb {
            width: 44px;
            height: 44px;
            border-radius: 6px;
            background: linear-gradient(135deg, #2a2a2a, #444);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            overflow: hidden;
        }

        .up-next-info {
            flex: 1;
            min-width: 0;
        }

        .up-next-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .up-next-artist {
            font-size: 11px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Bottom Player */
        .bottom-player {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            background: var(--bg-dark);
            border-top: 1px solid var(--border);
            gap: 20px;
            flex-shrink: 0;
        }

        .bp-song {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 220px;
            flex-shrink: 0;
        }

        .bp-thumb {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            background: linear-gradient(135deg, #2a2a2a, #555);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .bp-info { min-width: 0; }
        .bp-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bp-artist {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bp-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .bp-ctrl {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            width: 32px;
            height: 32px;
        }

        .bp-ctrl:hover { color: var(--pink); }
        .bp-ctrl.active { color: var(--pink); }

        .bp-play {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--pink);
            border: none;
            color: var(--text-dark);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .bp-play:hover {
            background: var(--pink-accent);
            transform: scale(1.05);
        }

        .bp-progress-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .bp-progress-bar {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .bp-progress-fill {
            height: 100%;
            background: var(--pink);
            border-radius: 2px;
            width: 35%;
            position: relative;
        }

        .bp-progress-fill::after {
            content: '';
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--pink);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .bp-progress-bar:hover .bp-progress-fill::after {
            opacity: 1;
        }

        .bp-times {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 11px;
            color: var(--text-muted);
        }

        .bp-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .bp-right svg {
            width: 20px;
            height: 20px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }

        .bp-right svg:hover { color: var(--text-light); }

        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .volume-bar {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            cursor: pointer;
        }

        .volume-fill {
            height: 100%;
            background: var(--pink);
            border-radius: 2px;
            width: 65%;
        }

        .lyrics-btn {
            padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid #555;
            background: transparent;
            color: var(--text-light);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lyrics-btn:hover {
            border-color: var(--pink);
            color: var(--pink);
        }

        /* Drop Zone Overlay */
        .drop-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(26,26,26,0.92);
            z-index: 200;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 16px;
            border: 3px dashed var(--pink);
        }

        .drop-overlay.active { display: flex; }
        .drop-overlay-icon { font-size: 64px; margin-bottom: 16px; }
        .drop-overlay-text { font-size: 20px; font-weight: 700; color: var(--text-light); }

        /* Hidden file input */
        #fileInput { display: none; }

        /* Responsive */
        @media (max-width: 1100px) {
            .player-window { width: 100%; height: 100vh; border-radius: 0; }
            .sidebar-right { display: none; }
        }

        @media (max-width: 768px) {
            .sidebar-left { display: none; }
        }
    </style>
</head>
<body>

<div class="player-window" id="app">
    <!-- Drop Overlay -->
    <div class="drop-overlay" id="dropOverlay">
        <div class="drop-overlay-icon">🎵</div>
        <div class="drop-overlay-text">Suelta tus archivos aquí</div>
    </div>

    <!-- Title Bar -->
    <div class="title-bar">
        <h1>AURORA PLAYER</h1>
        <div class="window-controls">
            <button class="win-btn" title="Buscar" onclick="document.getElementById('fileInput').click()">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
            <button class="win-btn" title="Agregar archivos" onclick="document.getElementById('fileInput').click()">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            </button>
            <button class="win-btn" title="Configuración">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            </button>
            <button class="win-btn">—</button>
            <button class="win-btn">☐</button>
            <button class="win-btn close">✕</button>
        </div>
    </div>

    <!-- Main -->
    <div class="main-layout">
        <!-- Left Sidebar -->
        <div class="sidebar-left">
            <div class="sidebar-section">
                <div class="sidebar-label">Library</div>
                <div class="sidebar-item" data-section="home">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                    Home
                </div>
                <div class="sidebar-item active" data-section="songs">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                    Songs
                </div>
                <div class="sidebar-item" data-section="albums">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                    Albums
                </div>
                <div class="sidebar-item" data-section="artists">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Artists
                </div>
                <div class="sidebar-item" data-section="playlists">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    Playlists
                </div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-label">Explore</div>
                <div class="sidebar-item" data-section="explore">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
                    Explore
                </div>
                <div class="sidebar-item" data-section="nowplaying">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    Now Playing
                </div>
            </div>
        </div>

        <!-- Center Content -->
        <div class="content-center">
            <div class="content-header">
                <h2>Songs</h2>
            </div>

            <div class="table-header">
                <span>#</span>
                <span>Title</span>
                <span>Artist</span>
                <span>Album</span>
                <span>Duration</span>
                <span>Love</span>
            </div>

            <div class="songs-table" id="songsTable">
                <div style="padding:40px; text-align:center; color:#666; font-size:14px;" id="emptyMsg">
                    Arrastra archivos de música aquí o haz clic en + para agregar
                </div>
            </div>
        </div>

        <!-- Right Sidebar -->
        <div class="sidebar-right">
            <div class="up-next-title">UP NEXT</div>
            <div id="upNextList"></div>
        </div>
    </div>

    <!-- Bottom Player -->
    <div class="bottom-player">
        <div class="bp-song">
            <div class="bp-thumb" id="bpThumb">🎵</div>
            <div class="bp-info">
                <div class="bp-name" id="bpName">No playing</div>
                <div class="bp-artist" id="bpArtist">—</div>
            </div>
        </div>

        <div class="bp-controls">
            <button class="bp-ctrl" id="btnShuffle" title="Shuffle">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
            </button>
            <button class="bp-ctrl" id="btnPrev" title="Previous">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="bp-play" id="btnPlay" title="Play">
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="bp-ctrl" id="btnNext" title="Next">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button class="bp-ctrl" id="btnRepeat" title="Repeat">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            </button>
        </div>

        <div class="bp-progress-area">
            <div class="bp-progress-bar" id="progressBar">
                <div class="bp-progress-fill" id="progressFill"></div>
            </div>
            <div class="bp-times">
                <span id="curTime">0:00</span>
                <span id="totTime">0:00</span>
            </div>
        </div>

        <div class="bp-right">
            <div class="volume-wrap">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                <div class="volume-bar" id="volBar">
                    <div class="volume-fill" id="volFill"></div>
                </div>
            </div>
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" title="Queue"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            <button class="lyrics-btn">Lyrics</button>
        </div>
    </div>
</div>

<input type="file" id="fileInput" accept=".mp3,.wav,.ogg,.flac,.aac,.m4a,.wma,.opus,.mp4,.avi,.mkv,.mov,.webm,.mpg,.mpeg,.3gp,.m4v,.wmv" multiple>
<audio id="audioEl"></audio>

<script>
(function() {
    var tracks = [];
    var currentIdx = -1;
    var isPlaying = false;
    var isShuffle = false;
    var isRepeat = false;

    var audioEl = document.getElementById('audioEl');
    var fileInput = document.getElementById('fileInput');
    var songsTable = document.getElementById('songsTable');
    var emptyMsg = document.getElementById('emptyMsg');
    var upNextList = document.getElementById('upNextList');

    var musicExt = /\.(mp3|wav|ogg|flac|aac|m4a|wma|opus)$/i;

    function fmt(s) {
        if (isNaN(s) || !isFinite(s)) return '0:00';
        var m = Math.floor(s / 60);
        var sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function addFiles(files) {
        for (var i = 0; i < files.length; i++) {
            var f = files[i];
            if (musicExt.test(f.name) || f.type.indexOf('audio') !== -1) {
                tracks.push({
                    file: f,
                    url: URL.createObjectURL(f),
                    name: f.name.replace(/\.[^/.]+$/, ''),
                    artist: 'Unknown Artist',
                    album: 'Unknown Album',
                    fav: false
                });
            }
        }
        renderAll();
    }

    function renderAll() {
        renderTable();
        renderUpNext();
        if (tracks.length > 0 && currentIdx === -1) {
            emptyMsg.style.display = 'none';
        } else if (tracks.length === 0) {
            emptyMsg.style.display = '';
        }
    }

    function renderTable() {
        // Keep empty message, remove tracks
        var rows = songsTable.querySelectorAll('.track-row');
        rows.forEach(function(r) { r.remove(); });

        if (tracks.length === 0) {
            emptyMsg.style.display = '';
            return;
        }
        emptyMsg.style.display = 'none';

        for (var i = 0; i < tracks.length; i++) {
            (function(idx) {
                var t = tracks[idx];
                var el = document.createElement('div');
                el.className = 'track-row' + (idx === currentIdx ? ' playing' : '');
                el.innerHTML =
                    '<span class="num">' + (idx + 1) + '</span>' +
                    '<span class="title-cell"><span class="dot"></span>' + t.name + '</span>' +
                    '<span class="artist-cell">' + t.artist + '</span>' +
                    '<span class="album-cell">' + t.album + '</span>' +
                    '<span class="duration-cell" data-idx="' + idx + '">—</span>' +
                    '<span class="love-cell"><button class="love-btn' + (t.fav ? ' liked' : '') + '" data-idx="' + idx + '">' + (t.fav ? '♥' : '♡') + '</button></span>';
                el.addEventListener('click', function(e) {
                    if (e.target.classList.contains('love-btn')) return;
                    playTrack(idx);
                });
                songsTable.appendChild(el);

                // Get duration
                var tmp = new Audio();
                tmp.src = t.url;
                tmp.addEventListener('loadedmetadata', function() {
                    var durEl = songsTable.querySelector('.duration-cell[data-idx="' + idx + '"]');
                    if (durEl) durEl.textContent = fmt(tmp.duration);
                });
            })(i);
        }

        // Love buttons
        songsTable.querySelectorAll('.love-btn').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                var idx = parseInt(this.getAttribute('data-idx'));
                tracks[idx].fav = !tracks[idx].fav;
                this.textContent = tracks[idx].fav ? '♥' : '♡';
                this.classList.toggle('liked', tracks[idx].fav);
            });
        });
    }

    function renderUpNext() {
        upNextList.innerHTML = '';
        var start = currentIdx >= 0 ? currentIdx + 1 : 0;
        var count = 0;
        for (var i = start; i < tracks.length && count < 8; i++) {
            (function(idx) {
                var t = tracks[idx];
                var el = document.createElement('div');
                el.className = 'up-next-item';
                el.innerHTML =
                    '<div class="up-next-thumb">🎵</div>' +
                    '<div class="up-next-info">' +
                        '<div class="up-next-name">' + t.name + '</div>' +
                        '<div class="up-next-artist">' + t.artist + '</div>' +
                    '</div>';
                el.addEventListener('click', function() { playTrack(idx); });
                upNextList.appendChild(el);
                count++;
            })(i);
        }
        // Wrap around
        if (count < 8 && tracks.length > 0) {
            for (var i = 0; i < start && count < 8; i++) {
                (function(idx) {
                    var t = tracks[idx];
                    var el = document.createElement('div');
                    el.className = 'up-next-item';
                    el.innerHTML =
                        '<div class="up-next-thumb">🎵</div>' +
                        '<div class="up-next-info">' +
                            '<div class="up-next-name">' + t.name + '</div>' +
                            '<div class="up-next-artist">' + t.artist + '</div>' +
                        '</div>';
                    el.addEventListener('click', function() { playTrack(idx); });
                    upNextList.appendChild(el);
                    count++;
                })(i);
            }
        }
    }

    function playTrack(idx) {
        if (idx < 0 || idx >= tracks.length) return;
        currentIdx = idx;
        audioEl.src = tracks[idx].url;
        audioEl.play();
        isPlaying = true;
        updateUI();
        renderTable();
        renderUpNext();
    }

    function togglePlay() {
        if (currentIdx === -1 && tracks.length > 0) { playTrack(0); return; }
        if (currentIdx === -1) return;
        if (isPlaying) { audioEl.pause(); isPlaying = false; }
        else { audioEl.play(); isPlaying = true; }
        updateUI();
        renderTable();
    }

    function playPrev() {
        if (tracks.length === 0) return;
        var idx = currentIdx - 1;
        if (idx < 0) idx = tracks.length - 1;
        playTrack(idx);
    }

    function playNext() {
        if (tracks.length === 0) return;
        var idx;
        if (isShuffle) {
            idx = Math.floor(Math.random() * tracks.length);
        } else {
            idx = currentIdx + 1;
            if (idx >= tracks.length) idx = 0;
        }
        playTrack(idx);
    }

    function updateUI() {
        var t = currentIdx >= 0 ? tracks[currentIdx] : null;
        document.getElementById('bpName').textContent = t ? t.name : 'No playing';
        document.getElementById('bpArtist').textContent = t ? t.artist : '—';
        document.getElementById('playIcon').innerHTML = isPlaying
            ? '<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>'
            : '<path d="M8 5v14l11-7z"/>';
    }

    // Audio events
    audioEl.addEventListener('timeupdate', function() {
        var pct = audioEl.duration ? (audioEl.currentTime / audioEl.duration) * 100 : 0;
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('curTime').textContent = fmt(audioEl.currentTime);
        document.getElementById('totTime').textContent = fmt(audioEl.duration);
    });

    audioEl.addEventListener('ended', function() {
        if (isRepeat) { audioEl.currentTime = 0; audioEl.play(); }
        else playNext();
    });

    // Buttons
    document.getElementById('btnPlay').addEventListener('click', togglePlay);
    document.getElementById('btnPrev').addEventListener('click', playPrev);
    document.getElementById('btnNext').addEventListener('click', playNext);
    document.getElementById('btnShuffle').addEventListener('click', function() {
        isShuffle = !isShuffle;
        this.classList.toggle('active', isShuffle);
    });
    document.getElementById('btnRepeat').addEventListener('click', function() {
        isRepeat = !isRepeat;
        this.classList.toggle('active', isRepeat);
    });

    // Progress bar
    document.getElementById('progressBar').addEventListener('click', function(e) {
        var r = this.getBoundingClientRect();
        var pct = (e.clientX - r.left) / r.width;
        audioEl.currentTime = pct * audioEl.duration;
    });

    // Volume
    document.getElementById('volBar').addEventListener('click', function(e) {
        var r = this.getBoundingClientRect();
        var v = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
        audioEl.volume = v;
        document.getElementById('volFill').style.width = (v * 100) + '%';
    });

    // File input
    fileInput.addEventListener('change', function() {
        if (this.files.length > 0) {
            addFiles(this.files);
            this.value = '';
        }
    });

    // Drag & drop
    var app = document.getElementById('app');
    var overlay = document.getElementById('dropOverlay');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(function(evt) {
        app.addEventListener(evt, function(e) { e.preventDefault(); e.stopPropagation(); });
    });

    app.addEventListener('dragenter', function() { overlay.classList.add('active'); });
    app.addEventListener('dragover', function() { overlay.classList.add('active'); });

    app.addEventListener('dragleave', function(e) {
        if (!app.contains(e.relatedTarget)) overlay.classList.remove('active');
    });

    app.addEventListener('drop', function(e) {
        overlay.classList.remove('active');
        if (e.dataTransfer.files.length > 0) addFiles(e.dataTransfer.files);
    });

    // Sidebar nav
    document.querySelectorAll('.sidebar-item').forEach(function(item) {
        item.addEventListener('click', function() {
            document.querySelectorAll('.sidebar-item').forEach(function(i) { i.classList.remove('active'); });
            this.classList.add('active');
        });
    });

    // Keyboard
    document.addEventListener('keydown', function(e) {
        if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
            e.preventDefault();
            togglePlay();
        }
    });
})();
</script>
</body>
</html>
